function norm(s) {
  return (s || "").toString().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function render() {
  const q = norm(document.getElementById("q").value.trim());
  const results = document.getElementById("results");
  const meta = document.getElementById("meta");

  let list = CODES;
  if (q) {
    const terms = q.split(/\s+/).filter(Boolean);
    list = CODES.filter(item => {
      const hay = norm(item.code + " " + item.description + " " + item.categorie);
      return terms.every(t => hay.includes(t));
    });
  }

  meta.textContent = q ? `${list.length} résultat(s)` : `${CODES.length} code(s) disponibles`;

  if (!list.length) {
    results.innerHTML = '<div class="empty">Aucun résultat.</div>';
    return;
  }

  results.innerHTML = list.slice(0, 250).map(item => `
    <div class="card">
      <div class="code">${item.code}</div>
      <div class="desc">${item.description}</div>
      <div class="cat">${item.categorie || "Sans catégorie"}</div>
    </div>
  `).join("");
}
document.getElementById("q").addEventListener("input", render);
render();
</script>
