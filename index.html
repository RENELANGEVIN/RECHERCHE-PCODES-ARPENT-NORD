<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0f13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Codes AN">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Recherche Codes ArpentNord</title>
<style>
:root {
  --bg:#0d0f13;
  --panel:#111722;
  --card:#222833;
  --line:#3b4555;
  --text:#ffffff;
  --muted:#b9c1cc;
  --accent:#1f82d8;
}
* { box-sizing:border-box; }
html, body {
  margin:0;
  padding:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:Arial, Helvetica, sans-serif;
}
.header {
  position:sticky;
  top:0;
  z-index:10;
  background:var(--panel);
  border-bottom:2px solid #2b3442;
  padding:10px 10px 11px;
}
.topline {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:8px;
}
.logo {
  width:76px;
  height:auto;
  border-radius:4px;
}
.title {
  font-size:25px;
  font-weight:900;
  line-height:1.05;
  text-align:center;
}
.search {
  width:100%;
  font-size:30px;
  padding:13px 14px;
  border-radius:16px;
  border:3px solid var(--accent);
  outline:none;
  background:#fff;
  color:#000;
}
.actions {
  display:flex;
  gap:8px;
  margin-top:8px;
}
.btn {
  flex:1;
  border:0;
  border-radius:12px;
  padding:10px;
  color:#fff;
  background:#303744;
  font-size:17px;
}
.info {
  font-size:16px;
  color:var(--muted);
  text-align:center;
  padding-top:8px;
}
.results {
  padding:10px 10px 36px;
}
.card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:13px;
  margin-bottom:8px;
  padding:12px;
}
.row {
  display:flex;
  gap:12px;
}
.code {
  width:86px;
  flex:0 0 86px;
  font-size:30px;
  font-weight:900;
  line-height:1;
}
.desc {
  flex:1;
  font-size:21px;
  line-height:1.22;
}
.cat {
  margin-top:7px;
  margin-left:98px;
  color:#c7d0dc;
  font-size:13px;
}
.notice, .empty {
  background:#17202b;
  color:#dbe7f5;
  border:1px solid #334154;
  border-radius:12px;
  padding:11px;
  margin-bottom:10px;
  font-size:16px;
  line-height:1.3;
  text-align:center;
}
.hidden { display:none; }
@media(max-height:720px) {
  .logo { display:none; }
  .title { font-size:21px; }
  .search { font-size:26px; padding:11px 12px; }
}
</style>
</head>

function normalizeText(s) {
  return (s || "").toString().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function numericCode(item) {
  const n = parseInt(item.code, 10);
  return isNaN(n) ? 999999999 : n;
}

function sortResults(list, query) {
  const q = normalizeText(query);
  const numeric = /^\d+$/.test(q);
  return list.slice().sort((a,b) => {
    if (numeric) {
      const as = a.code.startsWith(q) ? 0 : 1;
      const bs = b.code.startsWith(q) ? 0 : 1;
      if (as !== bs) return as - bs;
    }
    return numericCode(a) - numericCode(b);
  });
}

function makeCard(item) {
  return `<div class="card">
    <div class="row">
      <div class="code">${item.code}</div>
      <div class="desc">${item.description}</div>
    </div>
    <div class="cat">${item.categorie || ""}</div>
  </div>`;
}

function render(forceAll=false) {
  const qRaw = document.getElementById("q").value.trim();
  const q = normalizeText(qRaw);
  const results = document.getElementById("results");
  const info = document.getElementById("info");
  const notice = document.getElementById("notice");

  let list = [];
  if (forceAll) {
    list = CODES.slice();
  } else if (q.length > 0) {
    const terms = q.split(/\s+/).filter(Boolean);
    list = CODES.filter(item => {
      const hay = normalizeText(item.code + " " + item.description + " " + item.categorie);
      return terms.every(t => hay.includes(t));
    });
  }

  list = sortResults(list, qRaw);
  notice.style.display = (!forceAll && q.length === 0) ? "block" : "none";
  info.textContent = (forceAll || q.length > 0) ? list.length + " résultat(s)" : CODES.length + " codes disponibles";

  if (!forceAll && q.length === 0) {
    results.innerHTML = "";
    return;
  }

  if (!list.length) {
    results.innerHTML = `<div class="empty">Aucun résultat</div>`;
    return;
  }

  results.innerHTML = list.slice(0, 500).map(makeCard).join("");
}

function clearSearch() {
  document.getElementById("q").value = "";
  render(false);
  document.getElementById("q").focus();
}

function showAll() {
  document.getElementById("q").value = "";
  render(true);
}

const q = document.getElementById("q");
["input","keyup","change","search"].forEach(evt => q.addEventListener(evt, () => render(false)));
window.addEventListener("load", () => render(false));
render(false);
</script>
