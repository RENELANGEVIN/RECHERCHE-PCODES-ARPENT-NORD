function norm(s){return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function num(i){let n=parseInt(i.code,10);return isNaN(n)?999999999:n;}
function sortList(list,q){let qq=norm(q), numeric=/^\d+$/.test(qq);return list.slice().sort((a,b)=>{if(numeric){let as=a.code.startsWith(qq)?0:1, bs=b.code.startsWith(qq)?0:1;if(as!==bs)return as-bs;}return num(a)-num(b);});}
function card(i){return `<div class="card"><div class="row"><div class="code">${i.code}</div><div class="desc">${i.description}</div></div><div class="cat">${i.categorie||""}</div></div>`;}
function render(all=false){let raw=document.getElementById("q").value.trim(), q=norm(raw), list=[];if(all) list=CODES.slice(); else if(q){let terms=q.split(/\s+/).filter(Boolean);list=CODES.filter(i=>terms.every(t=>norm(i.code+" "+i.description+" "+i.categorie).includes(t)));}list=sortList(list,raw);document.getElementById("notice").style.display=(!all&&!q)?"block":"none";document.getElementById("info").textContent=(all||q)?list.length+" résultat(s)":CODES.length+" codes disponibles";document.getElementById("results").innerHTML=(!all&&!q)?"":(list.length?list.slice(0,500).map(card).join(""):'<div class="empty">Aucun résultat</div>');}
